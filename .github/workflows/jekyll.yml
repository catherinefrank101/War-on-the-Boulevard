You can build a CollectionBuilder site without installing the desktop software (GitHub Desktop, VS Code, Ruby, etc.). Instead, you can do everything directly inside the GitHub website interface. This works well for projects like yours where you already have images and a metadata CSV.

Below is the simpler вҖңno-desktopвҖқ method that adapts those instructions to GitHub web only.

How to Use CollectionBuilder Without Desktop Software
1. Create the repository from the template
Go to the template repository:
https://github.com/CollectionBuilder/collectionbuilder-csv

Click Use this template

Click Create a new repository

Name it something simple like:

punk-archive
Set it to Public

Click Create repository

You now have a CollectionBuilder project already set up.

2. Upload your metadata CSV
In your repository:

Click the folder _data

Click Add file

Click Upload files

Upload your metadata CSV file

Example:

punk_metadata.csv
Then click Commit changes.

3. Tell CollectionBuilder to use your metadata
Now edit the configuration.

Open the file _config.yml

Click the pencil icon (edit)

Find this line:

metadata:
Change it to the name of your CSV without .csv

Example:

metadata: punk_metadata
Then click Commit changes.

4. Upload your images
Open the objects folder

Click Add file

Click Upload files

Upload all your images

Example:

bay_area_punk_flyers_8161_7_1.jpg
cometbus_4_8107_box_4_4.jpg
Commit changes.

Important:
Your metadata identifier or object_location field must match the file names.

5. Turn on GitHub Pages
Go to Settings

Click Pages on the left

Under Source, choose:

GitHub Actions
6. Enable the Jekyll workflow
GitHub will suggest a Jekyll workflow.

Click:

Configure
Then click:

Commit changes
This will automatically build the site.

7. Wait for the site to deploy
Go to the Actions tab.

You will see the build running.

When it finishes, your site will be live at:

https://YOURUSERNAME.github.io/REPOSITORYNAME
Example:

https://pbsail.github.io/punk-archive
What You Actually Need (No Desktop)
You only need:

GitHub account

Metadata CSV

Image files

Browser

You do NOT need:

GitHub Desktop

VS Code

Ruby

Jekyll

Terminal commands

GitHub Actions builds everything automatically.

For Your Project (Important)
Since you are using multiple punk collections, the most reliable setup is:

One combined metadata CSV

Example:

punk_collection_metadata.csv
containing:

Bay Area flyers

Cometbus

DC Hardcore

Gretchen Phillips

etc.

Then upload all images to /objects/.

