Failed to restore: Cache service responded with 400


Thought for 9s
The Node.js 20 message is only a warning. It did not cause your build to fail. The failure came from GitHubвҖҷs services/cache layer:

Failed to save: Our services aren't available right now

Failed to restore: Cache service responded with 400

Those errors point to a GitHub Actions / cache service problem, not a problem with your metadata file itself. GitHub has also announced the Node 20 deprecation timeline, but that warning is separate from the immediate failure. 

What to do right now:

Re-run the workflow first.
Because the log says GitHub services were unavailable, the fastest fix is often just to run it again. Temporary Actions/cache outages have caused similar failures for other users. 

If it fails again, disable caching in the workflow.
Open .github/workflows/jekyll.yml and look for any cache-related behavior. If your workflow includes a cache step or dependency caching, remove it temporarily. Cache-related failures with 400/422 errors have been reported, and disabling cache is a common workaround. 

Do not worry about the Node 20 warning yet.
GitHub says Node 20 actions are being deprecated and runners will move to Node 24, but the warning alone does not stop the build. 

If the workflow keeps failing, reset Pages once.
In your repo:

Settings вҶ’ Pages

change Source away from GitHub Actions if possible, save

switch back to GitHub Actions

then rerun the deployment
A GitHub community workaround for Pages build issues is to disable/re-enable Pages or the deployment workflow. 

Here is the part that matters most for you:

Your error does not look like вҖңbad CSV formattingвҖқ or вҖңwrong _config.yml metadata name.вҖқ It looks like GitHub failed during the build infrastructure step. If you want, paste your .github/workflows/jekyll.yml file here and IвҖҷll tell you exactly what to delete or edit so it works for CollectionBuilder.


how do i Add GitHub Actions workflow for Jekyll deployment #1


Thought for 8s
To add the GitHub Actions workflow for Jekyll deployment directly on the GitHub website:

Open your repository on GitHub.

Click Settings.

In the left sidebar, click Pages.

Under Build and deployment, set Source to GitHub Actions. GitHub says this is the recommended approach for Jekyll deployments. 

After that, GitHub should show suggested workflows.

In the suggested workflows area, find Jekyll.

Click Configure.

GitHub will open a new file called something like .github/workflows/jekyll.yml.

You do not need to write the file from scratch. Just click Commit changes to add it to your repository. Once committed, that workflow will start the Pages build/deploy process. 

Then check the deployment:

Click the Actions tab to watch the workflow run.

When it finishes successfully, go back to Settings вҶ’ Pages and GitHub will show your live site URL there. 

For your CollectionBuilder repo, also make sure _config.yml has the right values before expecting the site to build correctly:

url: https://YOURUSERNAME.github.io
baseurl: /YOUR-REPOSITORY-NAME
metadata: your_csv_filename_without_csv
Those values are what CollectionBuilder uses for the site URL and metadata file hookup, and Jekyll reads _config.yml for site configuration. 

If the Jekyll button does not appear:

go to Settings вҶ’ Actions вҶ’ General

allow GitHub Actions for the repository

then return to Settings вҶ’ Pages and try again. GitHub notes that Pages publishing with Actions requires Actions to be enabled. 

If you want, paste your current repo name and GitHub username, and IвҖҷll write the exact _config.yml lines you should use.


what is wrong here: # This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        # https://github.com/ruby/setup-ruby/releases/tag/v1.207.0
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.1' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


Thought for 8s
Nothing is obviously wrong with the YAML structure itself. Your workflow is basically the standard GitHub Pages Jekyll workflow: it checks out the repo, sets up Ruby, configures Pages, builds Jekyll into _site, uploads the Pages artifact, and deploys it. GitHubвҖҷs Pages docs use this same overall pattern. 

What is actually standing out is this line in your earlier logs:

bundler-cache: true

That setting tells ruby/setup-ruby to automatically run bundle install and use the GitHub Actions cache. In your case, the earlier failure messages were:

Failed to save: Our services aren't available right now

Failed to restore: Cache service responded with 400

So the workflow itself is probably fine, but the cache step is what is breaking the build, not Jekyll syntax. 

What to change
Edit this section:

      - name: Setup Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0
to this:

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Install gems
        run: bundle install
Why this helps
This does two useful things:

It turns off the cache layer that appears to be failing in your logs.

It switches from a pinned commit hash to @v1, which is simpler to manage in a normal student/project repo.

Also important
The Node.js 20 deprecation warning is not the main error. It is a warning about future runner behavior, not the thing that caused exit code 1. Your actual failure was tied to GitHubвҖҷs save/restore cache services. 

Best cleaned-up version
Try this full workflow:

name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Install gems
        run: bundle install

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
One more thing to check
Even with the workflow fixed, CollectionBuilder will still fail if your repo config is wrong. Make sure _config.yml has:

url: https://YOURUSERNAME.github.io
baseurl: /YOUR-REPOSITORY-NAME
metadata: your_csv_filename_without_csv
That part is separate from the workflow, but it is the next most common reason the site still does not load correctly after deployment.

