where do i find yaml

You will find the YAML file in your GitHub repository, not on your computer.

There are actually two YAML files you may see in a CollectionBuilder project.

1. The workflow YAML (the one you posted)
Location in your repository:

.github/workflows/jekyll.yml
How to find it
Open your repository on GitHub

Click the folder:

.github
Click the folder:

workflows
Click the file:

jekyll.yml
You will see the YAML workflow you pasted earlier.

To edit it:

Click the pencil icon

Edit

Click Commit changes

2. The CollectionBuilder config YAML (VERY important)
This is actually the file that controls your site settings and metadata.

Location:

_config.yml
How to find it
Open your repository and look in the top level.

Example repository structure:

repository-name
в”Ӯ
в”ңв”Җв”Җ _config.yml
в”ңв”Җв”Җ _data
в”ңв”Җв”Җ objects
в”ңв”Җв”Җ pages
в”ңв”Җв”Җ _layouts
в””в”Җв”Җ _includes
Click:

_config.yml
Then click the pencil icon to edit.

What you need to check in _config.yml
Make sure these lines exist and are correct:

url: https://YOURUSERNAME.github.io
baseurl: /REPOSITORYNAME
metadata: your_csv_filename
Example:

url: https://pbsail.github.io
baseurl: /punk-archive
metadata: punk_metadata
Important:

Do NOT include .csv

The CSV must be inside the _data folder

